<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Freeware sin costos</title>
  <desc id="desc">Una computadora con un sello de costo cero y tres marcas de verificaci&#243;n representa que no hay costos de instalaci&#243;n, mantenimiento ni suscripci&#243;n.</desc>
